<!DOCTYPE html>

<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device width, initial-scale=1.0">
        <title>Sequence</title>
        <link rel="stylesheet" type="text/css" href="home.css">
        <script src="auth.js" defer></script>
        <script src="mode.js" dever></script>
        <title>Home</title>
    </head>
    <body onload="onPageLoad()">
        <br/>
        <container id="main">
            <container class="PlaylistBox">
                <div id="PlaylistSection" class="row">
                    <label for="playlists" class="form-label">Playlists: </label>
                    <select id="playlists" onchange="selectPlaylist(this)" class="form-control">
                    </select>
                    <input id="refresher" type="button" onclick="refreshPlaylists()" value="Refresh Playlists">
                </div>
            </container>
            <container class="TrackBox">
                <div id="TrackSection" class="row">               
                    <table id="Tracks">
                    </table>
                </div>
            </container>
        </container>
    </body>
</html>
