<!DOCTYPE html>

<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>Sequence</title>
        <link rel="stylesheet" type="text/css" href="home.css">
        <script src="auth.js" defer></script>
        <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
    </head>
    <body onload="onPageLoad()">
        <header>
            <nav class="nav-bar">
                <ul class="nav-list">
                    <li>
                        <nav class="navbar navbar-expand-lg navbar-light bg-light">
                            <div class="container-fluid">
                                <button type="button" id="sidebarCollapse" class="btn btn-info">
                                    <i class="fas fa-align-left"></i>
                                    <span>Toggle Sidebar</span>
                                </button>
                    
                            </div>
                        </nav>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link nav-link-ltr" href="#">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link nav-link-ltr" href="#">Contact</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link nav-link-ltr" href="#">Help</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link nav-link-ltr" href="#">About</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link nav-link-ltr" href="#">Logo</a>
                    </li>
                </ul>
            </nav>
        </header>
        <div class="wrapper">
            <nav id="sidebar" class="">
                <div class="sidebar-header">
                    <h3 class="subheading">Playlists</h3>
                </div>
                <button class="mybtn" onclick="refreshPlaylists()">Refresh Playlists</button>
                <ul class="playlists" id="playlist-list">
                </ul>               
            </nav>
            <div class="tracks" id="tracks">
                <h3 class="subheading">Playlist Tracklist</h3>
                <br/>
                <table class="tracks-table" id="tracks-table">
                    <tr><td class="gentext">This will autopopulate with tracks once you select a playlist.</td></tr>
                </table>
            </div>     
        </div>
        <footer>
            <p>Powered by Spotify. All licensing rights reserved by them or some legal lingo. App created by Bryan Fraschetti, idea by Danny Kelly.</p>
        </footer>
    </body>
</html>
