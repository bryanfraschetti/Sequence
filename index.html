<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device width, initial-scale=1.0">
    <title>Sequence</title>
    <link rel="stylesheet" type="text/css" href="style.css">
    <script src="Sequence.js" defer></script>
</head>
<body onload="onPageLoad()">
    <div class="container">
        <div class="loginbox">
            <h1>Log in</h1><br/>
            <form id="login-form" class="acc_details">
                <p>Username</p>
                <input type="text" id="clientId" placeholder="Enter Username">
                <p>Password</p>
                <input type="password" id="clientSecret" placeholder="Enter Password"><br/><br/>
                <div>
                    <input type="button" onclick="requestAuthorization()" id="submit-button" value="Login">
                </div>
                <span id="login-error-msg-holder">
                    <p id="login-error-msg">Invalid username and/or password</p>
                </span>
            </form>
        </div>
        <center>
            <div id="PlaylistSection" class="row">
                <div class="col">
                    <div class="mb-3">
                        <label for="playlists" class="form-label">Playlists</label>
                        <select id="playlists" class="form-control">
                        </select>
                        <input type="button" onclick="refreshPlaylists()" value="Refresh Playlists">
                    </div>
                </div>
            </div>
        </center>
</div>
</body>
</html>
